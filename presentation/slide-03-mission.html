<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>核心使命 · Strategic Radar</title>
<link rel="stylesheet" href="assets/css/common.css">
<style>
.mission-center{display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex:1;gap:32px;}
.mission-stmt{text-align:center;padding:36px 60px;
  background:linear-gradient(135deg,rgba(37,99,235,.15),rgba(245,158,11,.08));
  border:1px solid rgba(37,99,235,.3);border-radius:20px;max-width:860px;}
.mission-stmt .eyebrow{font-size:12px;font-weight:700;color:var(--accent);
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;}
.mission-stmt h2{font-size:34px;font-weight:900;line-height:1.3;color:var(--text-1);}
.mission-stmt h2 em{color:#60A5FA;font-style:normal;}
.caps-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;width:100%;max-width:900px;}
.cap-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  padding:20px 16px;text-align:center;}
.cap-icon{font-size:32px;margin-bottom:10px;}
.cap-title{font-size:16px;font-weight:700;margin-bottom:6px;}
.cap-desc{font-size:13px;color:var(--text-2);line-height:1.5;}
.cap-card:nth-child(1){border-top:3px solid var(--primary);}
.cap-card:nth-child(2){border-top:3px solid var(--success);}
.cap-card:nth-child(3){border-top:3px solid var(--accent);}
.cap-card:nth-child(4){border-top:3px solid #A78BFA;}
</style>
</head>
<body>
<div class="slide">
  <div class="slide-header">
    <div class="slide-logo"><span class="dot"></span> Strategic Radar</div>
    <div id="slideChapter" class="slide-chapter muted"></div>
    <div id="slideNum" class="slide-num"></div>
  </div>
  <div class="slide-body">
    <h2 style="margin-bottom:20px;">我们要解决的核心问题</h2>
    <div class="mission-center">
      <div class="mission-stmt">
        <div class="eyebrow">核心命题</div>
        <h2>让出海决策者在 <em>60 秒</em> 内<br>拿到当日影响公司的 <em>关键情报</em></h2>
      </div>
      <div class="caps-row">
        <div class="cap-card">
          <div class="cap-icon">🎣</div>
          <div class="cap-title">抓得到</div>
          <div class="cap-desc">多源采集，精选 113 个高质量信息源，自动定时拉取</div>
        </div>
        <div class="cap-card">
          <div class="cap-icon">🧠</div>
          <div class="cap-title">看得懂</div>
          <div class="cap-desc">LLM 自动分类 PEST 维度、判断 O/T 方向、评级 H/M/L</div>
        </div>
        <div class="cap-card">
          <div class="cap-icon">📐</div>
          <div class="cap-title">排得齐</div>
          <div class="cap-desc">4 维价值评分公式，按紧迫度×权威性×相关度自动排序</div>
        </div>
        <div class="cap-card">
          <div class="cap-icon">🔔</div>
          <div class="cap-title">推得准</div>
          <div class="cap-desc">高影响告警实时推送飞书+邮件，Daily 简报早 9 点到达</div>
        </div>
      </div>
    </div>
  </div>
  <div class="slide-footer">
    <span>← → 键盘翻页</span>
    <div class="progress-bar"><div class="progress-bar-fill"></div></div>
    <span>Strategic Radar · 2026</span>
  </div>
</div>
<script src="assets/js/common.js"></script>
</body>
</html>
